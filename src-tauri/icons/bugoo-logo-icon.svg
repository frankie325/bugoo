<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="logo-icon-title logo-icon-desc">
  <title id="logo-icon-title">Bugoo App Icon</title>
  <desc id="logo-icon-desc">布谷鸟App图标 - 纯图标版本，适用于应用启动画面和桌面图标</desc>

  <defs>
    <linearGradient id="cuckooGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c17f3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5a2b;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#bgGrad)" stroke="#ebe5db" stroke-width="1" />

  <!-- 布谷鸟图标 -->
  <g id="cuckoo-icon" transform="translate(50, 50)">
    <!-- 主圆形背景 -->
    <circle cx="0" cy="0" r="32" fill="url(#cuckooGrad)" />

    <!-- 鸟身 -->
    <ellipse cx="-5" cy="5" rx="14" ry="11" fill="#ffffff" />

    <!-- 鸟头 -->
    <circle cx="8" cy="-5" r="8" fill="#ffffff" />

    <!-- 鸟嘴 -->
    <path d="M14,-6 L22,-7 L14,-8 Z" fill="#ffffff" />

    <!-- 翅膀 -->
    <ellipse cx="-8" cy="3" rx="7" ry="6" fill="#ffffff" opacity="0.85" />

    <!-- 眼睛 -->
    <circle cx="11" cy="-6" r="2" fill="#c17f3c" />

    <!-- 音符 - 表示记忆/学习 -->
    <g transform="translate(18, -18)" fill="#ffffff" opacity="0.9">
      <circle cx="6" cy="10" r="4" />
      <path d="M10,10 L10,20 L16,18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" />
    </g>
  </g>
</svg>