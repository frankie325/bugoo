<h2>视觉风格选择</h2>
<p class="subtitle">极简产品的界面应该干净、安静、不打扰用户</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>柔和浅色系</h3>
      <p>米白/浅灰背景 + 低饱和度蓝绿点缀，字体柔和，整体感觉像一本安静的笔记本。适合长时间使用不累眼。</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>深色沉浸系</h3>
      <p>深灰/墨色背景 + 暖白色文字，适合夜间使用，通知提醒时不会刺眼。强调内容，界面元素尽量隐去。</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>双主题（浅/深自适应）</h3>
      <p>跟随系统主题自动切换。确保两种模式下视觉都很干净。</p>
    </div>
  </div>
</div>

<p class="label" style="margin-top:1rem">提示：极简风格的核心是"不抢注意力"——让用户专注在单词和翻译上，而不是界面本身</p>
